<!doctype html>
<html lang="pt-pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles/style.css" />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png">
  <meta name="theme-color" content="#0f1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Anime HD">
  <link rel="apple-touch-icon" href="/assets/icons/android-chrome-192x192.png">
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
  <title></title>
</head>

<body>
  <aside class="modal-overlay open" id="termos-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path
              d="M11.46 20.846a12 12 0 0 1 -7.96 -14.846a12 12 0 0 0 8.5 -3a12 12 0 0 0 8.5 3a12 12 0 0 1 -.09 7.06" />
            <path d="M15 19l2 2l4 -4" />
          </svg>
        </div>
        <div>
          <p class="modal-header-title">Termos de utilização</p>
          <p class="modal-header-sub">Lê antes de continuar</p>
        </div>
      </div>
      <div class="termos-lista" id="termos-lista"></div>
      <button class="btn-aceitar" id="btn-aceitar">
        Concordo com os termos
      </button>
    </div>
  </aside>
  <header id="header">
    <!-- <img src="/assets/img/AniHD_logo.png" alt=""> -->
  </header>
  <main class="home">
    <section class="hero">
      <article class="banners"></article>
      <div class="hero-overlay">
        <div class="hero-content">
          <span class="hero-badge">Só em HD</span>
          <h1 class="hero-title">Sua coleção.<br /><span>Sua qualidade.</span></h1>
          <p class="hero-desc">
            Animes em HD, direto do seu acervo. Sem compressão, sem perda —
            exatamente como foram guardados.
          </p>
          <div class="hero-tags">
            <span>.MP4</span>
            <span>.MKV</span>
            <span>1080p</span>
            <span>4K</span>
          </div>
        </div>

        <div class="hero-stats">
          <div class="hero-stat" id="statAnimes">
            <span class="hero-stat-num">—</span>
            <span class="hero-stat-lbl">Animes</span>
          </div>
          <div class="hero-stat" id="statEps">
            <span class="hero-stat-num">—</span>
            <span class="hero-stat-lbl">Episódios</span>
          </div>
        </div>
      </div>
    </section>

    <section class="recomendados">
      <div class="header-rmd header-title">
        <h2>
          <span>Recomendados</span>
          <hr>
        </h2>
        <a href="/catalog">
          <span>Ver mais</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="icon icon-tabler icons-tabler-outline icon-tabler-arrow-narrow-right">
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <path d="M5 12l14 0" />
            <path d="M15 16l4 -4" />
            <path d="M15 8l4 4" />
          </svg>
        </a>
      </div>
      <div class="tabs-genero" id="tabsGenero">
        <button class="tab-genero active" data-genero="Todos">Todos</button>
        <!-- os restantes são gerados pelo JS -->
      </div>
      <div class="carrossel-wrapper">
        <button class="carrossel-btn left" id="btnLeft" aria-label="Anterior">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6" />
          </svg>
        </button>
        <div class="animes-rmd" id="list"></div>
        <button class="carrossel-btn right" id="btnRight" aria-label="Próximo">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>
      </div>
    </section>
  </main>
  <footer class="footer"></footer>
  <script src="/js/utils/global.js" defer></script>
  <script src="/js/components/card.js" defer></script>
  <script src="/js/pages/home.js" defer></script>
  <script src="/js/components/banner.js" defer></script>
  <script src="/js/components/carousel.js"></script>
</body>

</html>
