<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/style.css">
    <title>Lista — AniHD</title>
</head>

<body>
    <script>
        const params = new URLSearchParams(window.location.search);
        const tema = params.get("tema") || "light";
        if (tema === "dark") document.body.classList.add("dark");
    </script>
    <header>
        <div class="header-left">
            <h1>Lista</h1>
            <small id="contagem">A carregar...</small>
        </div>
        <div class="header-actions">
            <button class="btn-icon" id="btn-reload" data-tooltip="atualizar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
                    <path d="M21 3v5h-5" />
                </svg>
            </button>
            <button class="btn-icon" id="btn-add-info" data-tooltip="gerar info.json">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-file-plus">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M14 3v4a1 1 0 0 0 1 1h4" />
                    <path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2" />
                    <path d="M12 11l0 6" />
                    <path d="M9 14l6 0" />
                </svg>
            </button>
        </div>
    </header>
    <main class="lista-container">
        <section class="search">
            <input type="text" name="" id="input-search" placeholder="Pesquisar anime...">
        </section>
        <section class="lista-info-json" id="lista">
        </section>
    </main>
    <script type="module" src="../js/lista_info_json.js"></script>
</body>

</html>
